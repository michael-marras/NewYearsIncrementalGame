<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year's Incremental Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        #canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        canvas {
            display: block;
            border: 1px solid #333;
        }
        
        #status {
            color: #fff;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .loading {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="loading" id="status">Loading...</div>
        <div class="spinner" id="spinner"></div>
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>
    
    <script type="text/javascript">
        var statusElement = document.getElementById('status');
        var spinnerElement = document.getElementById('spinner');
        var canvas = document.getElementById('canvas');
        
        // Hide spinner and status when module is loaded
        window.addEventListener('load', function() {
            // Module loading is handled by Emscripten
        });
        
        // Update status messages
        if (typeof Module !== 'undefined') {
            Module['print'] = function(text) {
                console.log(text);
            };
            
            Module['printErr'] = function(text) {
                console.error(text);
            };
            
            Module['onRuntimeInitialized'] = function() {
                statusElement.textContent = 'Game Loaded!';
                setTimeout(function() {
                    statusElement.style.display = 'none';
                    spinnerElement.style.display = 'none';
                }, 500);
            };
            
            Module['locateFile'] = function(path, prefix) {
                // If we're loading from the same directory, use relative path
                return prefix + path;
            };
        }
    </script>
    
    {{{ SCRIPT }}}
</body>
</html>
